<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tellimuse vorm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
<div class="row text-center mb-5 mt-4">
  <div class="col">
     <span class="text-muted fw-bold">1 <br>Vali domeen</span>
  </div>
  <div class="col">
     <br><span class="text-primary fw-bold"><br>2<br>KONTAKTANDMED</span>
  </div>
  <div class="col">
    3 <br> <span class="text-muted fw-bold">MAKSA</span>
  </div>
</div>

<div class="container mt-5">

  <h2 class="mb-4">KONTAKTANDMED</h2>

  <div class="card p-4 shadow-sm">

    <div class="mb-3">
      <label class="form-label">Nimi</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Arve saaja</label>
      <select class="form-select">
        <option>Eraisik</option>
        <option>Ettevõte</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Ettevõtte nimetus</label>
      <input type="text" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Ettevõtte registrikood</label>
      <input type="text" class="form-control">
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox">
      <label class="form-check-label">
        Nõustun tingimustega
      </label>
    </div>

  </div>

  <div class="card mt-4 shadow-sm">
    <div class="card-header">
      Tellimuse kokkuvõte
    </div>
    <div class="card-body">
      <p>Domeeni nimetus: <strong>minudomeen.ee</strong></p>
      <p>Periood: <strong>1 aasta</strong></p>
      <p>Hind: <strong>10 €</strong></p>
      <p>Käibemaks: <strong>2 €</strong></p>
      <hr>
      <h5>Lõppsumma: 12 €</h5>
    </div>
  </div>

 <div class="pt-4 mb-5">
    
    <button type="button" class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#confirmModal">
      Jätka
    </button>
  </div>

 </div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Kinnita tellimus</h5>
      <p>Kas oled kindel, et soovid jätkata?</p>
      <div class="d-grid gap-2">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tühista</button>
        <a href="final.html" class="btn btn-primary">Jätka</a>
      </div>
    </div>
  </div>
</div>
  

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
